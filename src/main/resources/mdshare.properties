io.github.junsik.md-share-confluence.md-share.label=Markdown (md-share)
io.github.junsik.md-share-confluence.md-share.desc=Render Markdown from the macro body, a page attachment, or an md-share link.
io.github.junsik.md-share-confluence.md-share.param.attachment.label=Markdown attachment file name
io.github.junsik.md-share-confluence.md-share.param.attachment.desc=Exact file name of a .md attachment on this page (e.g. report.md). If mistyped, the macro lists the page's markdown attachments.
io.github.junsik.md-share-confluence.md-share.param.url.label=md-share URL
io.github.junsik.md-share-confluence.md-share.param.url.desc=An md-share share link (/d/{id}) or raw URL. The host must be on the configured allowlist.
